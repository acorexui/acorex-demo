<div class="ax-mx-3 ax-flex ax-flex-col ax-items-center">
  <div
    #host
    class="ax-max-w-3xl ax-overflow-hidden ax-rounded-lg ax-bg-neutral-900 ax-shadow-lg"
  >
    <div class="ax-relative ax-aspect-video ax-bg-black">
      <video
        #video
        class="ax-h-full ax-w-full ax-object-contain"
        [src]="src()"
        playsinline
        preload="metadata"
        (play)="onPlayStateChange(true)"
        (pause)="onPlayStateChange(false)"
        (ended)="onEnded()"
        (timeupdate)="onTimeUpdate()"
        (loadedmetadata)="onLoadedMetadata()"
        (volumechange)="onVolumeChange()"
      ></video>
    </div>

    <div
      class="ax-flex ax-flex-col ax-gap-3 ax-border-t ax-border-neutral-700 ax-p-4 ax-text-neutral-100"
    >
      <div class="ax-flex ax-items-center ax-gap-3">
        <input
          type="range"
          class="ax-min-h-6 ax-flex-1 ax-cursor-pointer"
          min="0"
          max="100"
          step="0.1"
          [value]="seekPercent()"
          (input)="onSeekInput($event)"
          (change)="onSeekCommit()"
          [attr.aria-valuetext]="timeLabel()"
        />
        <span
          class="ax-shrink-0 ax-tabular-nums ax-text-xs ax-text-neutral-400"
        >
          {{ timeLabel() }}
        </span>
      </div>

      <div class="ax-flex ax-flex-wrap ax-items-center ax-gap-2">
        <ax-button color="default" (click)="skip(-10)" title="Back 10 seconds">
          <ax-icon>
            <i class="fa-solid fa-backward"></i>
          </ax-icon>
        </ax-button>

        <ax-button color="primary" (click)="togglePlay()" title="Play or pause">
          <ax-icon>
            <i [class]="playIconClass()"></i>
          </ax-icon>
        </ax-button>

        <ax-button
          color="default"
          (click)="skip(10)"
          title="Forward 10 seconds"
        >
          <ax-icon>
            <i class="fa-solid fa-forward"></i>
          </ax-icon>
        </ax-button>

        <ax-button
          color="default"
          (click)="toggleMute()"
          [title]="isMuted() ? 'Unmute' : 'Mute'"
        >
          <ax-icon>
            @if (isMuted()) {
              <i class="fa-solid fa-volume-xmark"></i>
            } @else {
              <i class="fa-solid fa-volume-high"></i>
            }
          </ax-icon>
        </ax-button>

        <label class="ax-flex ax-flex-1 ax-items-center ax-gap-2">
          <span class="ax-sr-only">Volume</span>
          <i class="fa-solid fa-volume-low ax-text-neutral-500"></i>
          <input
            type="range"
            class="ax-min-h-6 ax-flex-1 ax-cursor-pointer"
            min="0"
            max="100"
            step="1"
            [value]="volumePercent()"
            (input)="onVolumeInput($event)"
          />
        </label>

        <div class="ax-flex ax-flex-1 ax-items-center ax-gap-1">
          @for (rate of playbackRates; track rate) {
            <ax-button
              [color]="playbackRate() === rate ? 'primary' : 'default'"
              class="ax-min-w-[4rem] ax-px-2"
              (click)="setPlaybackRate(rate)"
              [title]="'Playback speed ' + rate + '×'"
            >
              {{ rate }}×
            </ax-button>
          }
        </div>

        <ax-button
          color="default"
          (click)="toggleFullscreen()"
          title="Fullscreen"
        >
          <ax-icon>
            <i class="fa-solid fa-expand"></i>
          </ax-icon>
        </ax-button>
      </div>
    </div>
  </div>
</div>
